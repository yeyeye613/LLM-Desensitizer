spring.application.name=ApiSensitivities
server.port=8080

# 日志配置
logging.level.root=INFO
logging.level.com.hdu.apisensitivities=DEBUG
# 日志文件配置
logging.file.path=./logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n


llm.default.temperature=0.7
llm.default.maxTokens=1000

llm.providers.openai.url=https://api.openai.com/v1/chat/completions
# 直接在此处输入OpenAI API密钥，替换YOUR_API_KEY_HERE
llm.providers.openai.key=${OPENAI_API_KEY}
llm.providers.openai.model=gpt-3.5-turbo

llm.providers.deepseek.url=https://api.deepseek.com/v1/chat/completions
# 直接在此处输入DeepSeek API密钥，替换YOUR_DEEPSEEK_API_KEY_HERE
llm.providers.deepseek.key=${DEEPSEEK_API_KEY}
llm.providers.deepseek.model= deepseek-chat

llm.providers.doubao.url=https://ark.cn-beijing.volces.com/api/v3/chat/completions
# 直接在此处输入豆包API密钥，替换YOUR_DOBAO_API_KEY_HERE
llm.providers.doubao.key=${DOUBAO_API_KEY}
llm.providers.doubao.model= doubao-pro

llm.providers.qwen.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# 直接在此处输入通义千问API密钥，替换YOUR_QWEN_API_KEY_HERE
llm.providers.qwen.key=${QWEN_API_KEY}
llm.providers.qwen.model= qwen-plus

llm.providers.kimi.url=https://api.moonshot.cn/v1/chat/completions
# 直接在此处输入Kimi API密钥，替换YOUR_KIMI_API_KEY_HERE
llm.providers.kimi.key=${KIMI_API_KEY}
llm.providers.kimi.model= moonshot-v1-8k

llm.providers.hunyuan.url=https://api.hunyuan.cloud.tencent.com/v1/chat/completions
# 直接在此处输入腾讯混元API密钥，替换YOUR_HUNYUAN_API_KEY_HERE
llm.providers.hunyuan.key=${HUNYUAN_API_KEY}
llm.providers.hunyuan.model= hunyuan-pro

# spring.datasource.url=jdbc:mysql://localhost:3306/ApiSensitivities
# spring.datasource.username=root
# spring.datasource.password=1234
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:h2:mem:ApiSensitivities;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.hdu.apisensitivities.entity


# Ollama 本地模型配置
llm.providers.ollama.url=http://localhost:11434/v1/chat/completions
# 本地调用不需要真实Key，填入任意字符即可
llm.providers.ollama.key=ollama
# 填入你通过 ollama list 查看到的准确名称
llm.providers.ollama.model=deepseek-r1:1.5b